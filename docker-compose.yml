services:
  minio:
    image: minio/minio
    container_name: uploadx-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: uploadx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: uploadx
      POSTGRES_PASSWORD: uploadx
      POSTGRES_DB: uploadx
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
